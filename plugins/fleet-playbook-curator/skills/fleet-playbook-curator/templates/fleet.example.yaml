# A fleet is DATA, not a skill: a named set of repos matched by an owner + glob.
# The detector re-derives membership live from this on every run — never hand-edit
# a member list. Members are joined on GitHub's stable node_id, so a rename is a
# rename, not a remove+add.
name: __FLEET_NAME__
owner: __OWNER__          # the GitHub org or user that owns the fleet members
glob: "__GLOB__"          # shell-style glob over repo NAMES, e.g. ansible-homelab-*

# Optional: repo names to exclude even if they match the glob (e.g. the playbook
# repo itself, archived experiments). Exact names, not globs.
exclude: []

# Optional: paths whose changes are "material" for content drift. If omitted, any
# new head_sha on a member counts as a change. Narrow this to cut curation noise.
# watched_paths:
#   - "README.md"
#   - ".github/workflows/**"
