# Cross-harness agent roster for the graveyard deep tier.
#
# pier runs the SAME task (evals/pier/tasks/graveyard-guarded-delete) under each
# of these real coding agents in a sandbox, so the safety invariant is proven to
# hold no matter which harness drives the graveyard skill — the cross-harness
# guarantee the plugin promises. Trim this list to the harnesses you have keys
# for; claude-code is the primary target.
#
# Each agent needs its provider key in the environment (pass via `--env-file`):
#   ANTHROPIC_API_KEY   (claude-code)
#   OPENAI_API_KEY      (codex)
#   GEMINI_API_KEY      (gemini-cli)
#   CURSOR_API_KEY      (cursor-cli)

- name: claude-code
  model_name: claude-opus-4-8
  kwargs:
    reasoning_effort: high

- name: codex
  model_name: gpt-5-codex

- name: gemini-cli
  model_name: gemini-2.5-pro

- name: cursor-cli
  model_name: claude-opus-4-8

# Sanity floor: `oracle` runs the reference solution, `nop` does nothing.
# oracle should always PASS and nop should always FAIL — if either flips, the
# task or verifier is miscalibrated, not the agent.
- name: oracle
- name: nop
